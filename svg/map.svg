<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 760"
     id="rus-map" aria-label="Стилизованная карта Руси XIII–XV веков"
     role="img" style="width:100%;height:auto;">

  <defs>
    <filter id="parchment-blur">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="water-grad" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#b8cce0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8aabb8" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="land-grad" cx="50%" cy="40%">
      <stop offset="0%"   stop-color="#e8d59a"/>
      <stop offset="100%" stop-color="#c9b870"/>
    </radialGradient>
    <!-- Мерцающая точка -->
    <radialGradient id="dot-glow" cx="50%" cy="50%">
      <stop offset="0%"   stop-color="#e8c84a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Фон карты — пергамент -->
  <rect width="700" height="760" fill="#f0e0a8" rx="8"/>
  <rect width="700" height="760" fill="url(#land-grad)" rx="8" opacity="0.6"/>

  <!-- Линии «старой карты» — координатная сетка -->
  <g stroke="#c9a227" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,6">
    <line x1="0"   y1="190" x2="700" y2="190"/>
    <line x1="0"   y1="380" x2="700" y2="380"/>
    <line x1="0"   y1="570" x2="700" y2="570"/>
    <line x1="175" y1="0"   x2="175" y2="760"/>
    <line x1="350" y1="0"   x2="350" y2="760"/>
    <line x1="525" y1="0"   x2="525" y2="760"/>
  </g>

  <!-- ── Водоёмы ──────────────────────────────────────────────────────── -->
  <!-- Балтийское море (схема) -->
  <path d="M0,60 Q40,40 80,55 Q110,65 130,55 Q160,45 180,60 Q200,75 190,95 Q175,115 155,110 Q130,105 110,115 Q85,125 60,115 Q30,105 10,90 Z"
        fill="url(#water-grad)" opacity="0.7"/>
  <text x="55" y="85" font-size="9" fill="#4a7090" font-style="italic" text-anchor="middle" font-family="serif">Балтийское море</text>

  <!-- Чудское озеро -->
  <ellipse cx="158" cy="195" rx="28" ry="48" fill="url(#water-grad)" opacity="0.8"/>
  <text x="158" y="243" font-size="8" fill="#4a7090" font-style="italic" text-anchor="middle" font-family="serif">Чудское</text>
  <text x="158" y="253" font-size="8" fill="#4a7090" font-style="italic" text-anchor="middle" font-family="serif">озеро</text>

  <!-- Ладожское озеро -->
  <ellipse cx="260" cy="95" rx="45" ry="28" fill="url(#water-grad)" opacity="0.7"/>
  <text x="260" y="98" font-size="8" fill="#4a7090" font-style="italic" text-anchor="middle" font-family="serif">Ладожское оз.</text>

  <!-- ── Реки ──────────────────────────────────────────────────────────── -->
  <g fill="none" stroke="#7aadc8" stroke-width="1.5" stroke-linecap="round" opacity="0.75">
    <!-- Нева -->
    <path d="M260,110 Q240,118 215,122 Q195,125 178,122"/>
    <!-- Волхов -->
    <path d="M235,110 Q226,145 220,175 Q218,200 215,225"/>
    <!-- Западная Двина -->
    <path d="M130,210 Q160,230 195,250 Q230,268 268,280"/>
    <!-- Ока -->
    <path d="M510,330 Q475,345 440,350 Q400,355 365,355 Q330,355 295,365 Q268,375 240,390"/>
    <!-- Волга -->
    <path d="M220,175 Q280,195 340,230 Q395,265 440,310 Q480,350 510,395 Q545,445 565,495 Q585,545 590,600"/>
    <!-- Дон -->
    <path d="M400,300 Q420,340 430,390 Q440,435 445,480 Q448,510 435,555 Q420,600 395,635 Q370,665 340,685"/>
    <!-- Днепр -->
    <path d="M268,280 Q280,330 285,390 Q288,440 280,490 Q272,540 255,585 Q235,630 210,665"/>
    <!-- Москва-река -->
    <path d="M340,330 Q355,335 370,328 Q388,320 400,300"/>
    <!-- Ижора -->
    <path d="M178,122 Q175,115 165,108 Q155,102 145,100"/>
  </g>

  <!-- Подписи рек -->
  <g font-size="8" fill="#5588aa" font-style="italic" font-family="serif">
    <text x="460" y="262" transform="rotate(20,460,262)">Волга</text>
    <text x="410" y="488" transform="rotate(70,410,488)">Дон</text>
    <text x="280" y="465" transform="rotate(80,280,465)">Днепр</text>
    <text x="410" y="352" transform="rotate(-5,410,352)">Ока</text>
    <text x="185" y="144" transform="rotate(-10,185,144)">Нева</text>
  </g>

  <!-- ── Земли и границы (упрощённые) ──────────────────────────────────── -->
  <!-- Новгородская земля -->
  <path d="M80,60 Q120,55 180,65 Q250,75 290,95 Q310,110 300,145 Q290,175 268,190 Q240,205 210,210 Q170,215 135,200 Q100,185 80,155 Q60,125 70,95 Z"
        fill="rgba(200,180,120,0.25)" stroke="#b8960a" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="185" y="140" font-size="10" fill="#7a5a00" font-family="serif" text-anchor="middle" font-style="italic">Новгородская</text>
  <text x="185" y="153" font-size="10" fill="#7a5a00" font-family="serif" text-anchor="middle" font-style="italic">земля</text>

  <!-- Тверское княжество -->
  <path d="M240,220 Q285,215 320,225 Q345,232 350,255 Q352,275 330,285 Q305,295 275,288 Q248,280 238,260 Q228,242 240,220 Z"
        fill="rgba(180,160,100,0.2)" stroke="#a08000" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Московское княжество -->
  <path d="M290,285 Q340,275 385,285 Q415,295 420,325 Q422,350 400,365 Q375,378 345,376 Q315,373 295,358 Q270,340 275,315 Q278,295 290,285 Z"
        fill="rgba(160,100,60,0.2)" stroke="#8a4000" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="348" y="332" font-size="10" fill="#5a2800" font-family="serif" text-anchor="middle" font-style="italic">Московское</text>
  <text x="348" y="345" font-size="10" fill="#5a2800" font-family="serif" text-anchor="middle" font-style="italic">княжество</text>

  <!-- Владимиро-Суздальская земля -->
  <path d="M380,255 Q440,245 490,260 Q520,270 525,300 Q527,325 505,338 Q480,348 450,345 Q415,340 390,325 Q368,308 368,285 Z"
        fill="rgba(180,150,80,0.2)" stroke="#907000" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="455" y="295" font-size="10" fill="#604000" font-family="serif" text-anchor="middle" font-style="italic">Владимирская</text>
  <text x="455" y="308" font-size="10" fill="#604000" font-family="serif" text-anchor="middle" font-style="italic">земля</text>

  <!-- Золотая Орда (юго-восток) -->
  <path d="M490,400 Q560,390 620,420 Q670,445 690,490 Q700,530 700,600 L700,760 L490,760 Q450,720 430,680 Q400,630 420,570 Q440,510 480,460 Q488,435 490,400 Z"
        fill="rgba(160,80,20,0.12)" stroke="#804010" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="580" y="580" font-size="13" fill="#8a4010" font-family="serif" text-anchor="middle" font-style="italic" opacity="0.8">Золотая</text>
  <text x="580" y="598" font-size="13" fill="#8a4010" font-family="serif" text-anchor="middle" font-style="italic" opacity="0.8">Орда</text>

  <!-- Великое Княжество Литовское (запад) -->
  <path d="M0,200 Q50,190 90,200 Q115,210 120,240 Q122,265 100,278 Q75,290 50,282 Q20,272 5,250 Q-5,228 0,200 Z"
        fill="rgba(80,130,80,0.15)" stroke="#406030" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="60" y="245" font-size="9" fill="#304820" font-family="serif" text-anchor="middle" font-style="italic">Литва</text>

  <!-- ── Города — точки ──────────────────────────────────────────────────── -->
  <!-- Новгород — главный -->
  <g class="map-point-group" data-id="novgorod" style="cursor:pointer">
    <circle class="map-point-ring" cx="215" cy="165" r="6" fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.7"/>
    <circle class="map-point-dot" cx="215" cy="165" r="6" fill="#c9a227"/>
    <circle cx="215" cy="165" r="3" fill="#fff" opacity="0.6"/>
    <text x="215" y="155" font-size="10" fill="#1e0f08" font-family="serif" font-weight="bold" text-anchor="middle">Новгород</text>
  </g>

  <!-- Псков -->
  <g class="map-point-group" data-id="peipus" style="cursor:pointer">
    <circle cx="140" cy="220" r="4" fill="#c9a227" class="map-point-dot"/>
    <circle cx="140" cy="220" r="4" fill="none" stroke="#c9a227" stroke-width="1.5" class="map-point-ring" opacity="0.5"/>
    <text x="128" y="235" font-size="9" fill="#1e0f08" font-family="serif" text-anchor="middle">Псков</text>
  </g>

  <!-- Нева / Ижора -->
  <g class="map-point-group" data-id="neva" style="cursor:pointer">
    <circle class="map-point-ring" cx="165" cy="118" r="5" fill="none" stroke="#7a1515" stroke-width="1.5" opacity="0.6"/>
    <circle class="map-point-dot" cx="165" cy="118" r="5" fill="#7a1515"/>
    <circle cx="165" cy="118" r="2.5" fill="#fff" opacity="0.5"/>
    <text x="180" y="112" font-size="8" fill="#7a1515" font-family="serif" font-weight="bold">⚔ Невская</text>
    <text x="180" y="122" font-size="8" fill="#7a1515" font-family="serif" font-weight="bold">битва 1240</text>
  </g>

  <!-- Переяславль-Залесский -->
  <g class="map-point-group" data-id="pereyaslavl" style="cursor:pointer">
    <circle class="map-point-dot" cx="390" cy="258" r="4.5" fill="#c9a227"/>
    <circle cx="390" cy="258" r="4.5" fill="none" stroke="#c9a227" stroke-width="1.2" class="map-point-ring" opacity="0.5"/>
    <text x="410" y="255" font-size="8" fill="#1e0f08" font-family="serif">Переяславль-</text>
    <text x="410" y="265" font-size="8" fill="#1e0f08" font-family="serif">Залесский</text>
  </g>

  <!-- Тверь -->
  <g class="map-point-group" data-id="tver" style="cursor:pointer">
    <circle class="map-point-dot" cx="290" cy="245" r="5" fill="#c9a227"/>
    <circle cx="290" cy="245" r="5" fill="none" stroke="#c9a227" stroke-width="1.3" class="map-point-ring" opacity="0.5"/>
    <text x="268" y="238" font-size="9" fill="#1e0f08" font-family="serif" text-anchor="end">Тверь</text>
  </g>

  <!-- Москва — особо выделенная -->
  <g class="map-point-group" data-id="moscow" style="cursor:pointer">
    <circle cx="340" cy="318" r="14" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.3" class="map-point-ring"/>
    <circle cx="340" cy="318" r="9"  fill="#c9a227" class="map-point-dot"/>
    <circle cx="340" cy="318" r="4.5"  fill="#1e0f08"/>
    <circle cx="340" cy="318" r="2"  fill="#c9a227"/>
    <!-- Кремль-значок -->
    <text x="340" y="305" font-size="11" fill="#1e0f08" font-family="serif" font-weight="bold" text-anchor="middle">★ МОСКВА</text>
  </g>

  <!-- Владимир -->
  <g class="map-point-group" data-id="vladimir" style="cursor:pointer">
    <circle class="map-point-dot" cx="445" cy="272" r="5.5" fill="#c9a227"/>
    <circle cx="445" cy="272" r="5.5" fill="none" stroke="#c9a227" stroke-width="1.3" class="map-point-ring" opacity="0.5"/>
    <text x="458" y="268" font-size="9" fill="#1e0f08" font-family="serif">Владимир</text>
  </g>

  <!-- Суздаль -->
  <g>
    <circle cx="468" cy="258" r="3" fill="#a08000" opacity="0.7"/>
    <text x="472" y="253" font-size="7.5" fill="#604000" font-family="serif">Суздаль</text>
  </g>

  <!-- Коломна -->
  <g>
    <circle cx="390" cy="355" r="3.5" fill="#8b5e3c" opacity="0.8"/>
    <text x="400" y="352" font-size="8" fill="#5c2e0a" font-family="serif">Коломна</text>
  </g>

  <!-- Серпухов -->
  <g>
    <circle cx="330" cy="375" r="3" fill="#8b5e3c" opacity="0.7"/>
    <text x="310" y="372" font-size="7.5" fill="#5c2e0a" font-family="serif" text-anchor="end">Серпухов</text>
  </g>

  <!-- Река Вожа — место битвы 1378 -->
  <g class="map-point-group" data-id="vozha" style="cursor:pointer">
    <circle class="map-point-ring" cx="455" cy="368" r="5" fill="none" stroke="#7a1515" stroke-width="1.5" opacity="0.6"/>
    <circle class="map-point-dot" cx="455" cy="368" r="5" fill="#7a1515"/>
    <circle cx="455" cy="368" r="2.5" fill="#fff" opacity="0.5"/>
    <text x="472" y="365" font-size="8" fill="#7a1515" font-family="serif">⚔ Битва на</text>
    <text x="472" y="375" font-size="8" fill="#7a1515" font-family="serif">р. Воже 1378</text>
  </g>

  <!-- Куликово поле -->
  <g class="map-point-group" data-id="kulikovo" style="cursor:pointer">
    <circle class="map-point-ring" cx="430" cy="452" r="8" fill="none" stroke="#7a1515" stroke-width="2" opacity="0.7"/>
    <circle class="map-point-dot" cx="430" cy="452" r="8" fill="#7a1515"/>
    <circle cx="430" cy="452" r="4" fill="#f0c830"/>
    <text x="430" y="438" font-size="10" fill="#7a1515" font-family="serif" font-weight="bold" text-anchor="middle">⚔ КУЛИКОВО</text>
    <text x="430" y="478" font-size="9"  fill="#7a1515" font-family="serif" text-anchor="middle">поле · 1380</text>
  </g>

  <!-- Городец Волжский (место смерти Невского) -->
  <g>
    <circle cx="540" cy="390" r="3" fill="#8b5e3c" opacity="0.7"/>
    <text x="548" y="388" font-size="7.5" fill="#5c2e0a" font-family="serif">Городец</text>
  </g>

  <!-- ── Роза ветров ─────────────────────────────────────────────────────── -->
  <g transform="translate(640,100)" opacity="0.7">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#c9a227" stroke-width="1"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#c9a227" stroke-width="0.5" stroke-dasharray="2,3"/>
    <!-- Стрелки -->
    <polygon points="0,-28 -4,-12 0,-18 4,-12" fill="#c9a227"/>
    <polygon points="0,28  -4,12  0,18  4,12"  fill="#a08000"/>
    <polygon points="-28,0 -12,-4 -18,0 -12,4" fill="#a08000"/>
    <polygon points="28,0  12,-4  18,0  12,4"  fill="#a08000"/>
    <!-- N -->
    <text x="0" y="-32" font-size="9" fill="#c9a227" font-family="serif" font-weight="bold" text-anchor="middle">С</text>
    <text x="0" y="42"  font-size="8" fill="#a08000" font-family="serif" text-anchor="middle">Ю</text>
    <text x="-36" y="4" font-size="8" fill="#a08000" font-family="serif" text-anchor="middle">З</text>
    <text x="36"  y="4" font-size="8" fill="#a08000" font-family="serif" text-anchor="middle">В</text>
    <circle cx="0" cy="0" r="3" fill="#c9a227"/>
  </g>

  <!-- Заголовок карты -->
  <text x="350" y="728" font-size="12" fill="#5c2e0a" font-family="serif" font-style="italic" text-anchor="middle" opacity="0.8">Русь XIII – XV вв. · Ключевые места</text>

  <!-- Нижняя декоративная рамка карты -->
  <rect x="2" y="2" width="696" height="756" fill="none" stroke="#c9a227" stroke-width="2" rx="8" opacity="0.5"/>
  <rect x="8" y="8" width="684" height="744" fill="none" stroke="#c9a227" stroke-width="0.8" rx="6" opacity="0.3" stroke-dasharray="4,4"/>
</svg>
